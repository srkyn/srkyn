<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">David Sarkisyan cybersecurity profile banner</title>
  <desc id="desc">Dark security profile banner with realistic terminal output</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04070f"/>
      <stop offset="1" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="730" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E09B3C" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#5EEAD4" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Depth waves -->
  <path d="M0 255C180 228 330 238 480 254C640 272 760 298 930 258C1100 218 1160 162 1280 176V320H0Z" fill="#0F766E" fill-opacity="0.10"/>
  <path d="M0 68C155 88 295 78 440 52C610 22 755 9 905 50C1065 94 1155 116 1280 80V0H0Z" fill="#1e1040" fill-opacity="0.28"/>

  <!-- Amber bottom strip — alert signal -->
  <rect x="0" y="312" width="1280" height="8" fill="#E09B3C" fill-opacity="0.45"/>

  <!-- Scattered dots — organic texture, not a grid -->
  <g fill="#94a3b8" fill-opacity="0.055">
    <circle cx="48" cy="28" r="2"/><circle cx="195" cy="14" r="1.5"/><circle cx="375" cy="42" r="2"/>
    <circle cx="510" cy="18" r="1.5"/><circle cx="675" cy="33" r="2"/><circle cx="845" cy="9" r="1.5"/>
    <circle cx="995" cy="38" r="2"/><circle cx="1145" cy="16" r="1.5"/><circle cx="1238" cy="52" r="2"/>
    <circle cx="28" cy="288" r="1.5"/><circle cx="165" cy="302" r="2"/><circle cx="338" cy="282" r="1.5"/>
    <circle cx="498" cy="298" r="2"/><circle cx="655" cy="312" r="1.5"/><circle cx="815" cy="287" r="2"/>
    <circle cx="978" cy="306" r="1.5"/><circle cx="1098" cy="283" r="2"/><circle cx="1258" cy="297" r="1.5"/>
    <circle cx="14" cy="158" r="1.5"/><circle cx="1264" cy="152" r="2"/>
    <circle cx="255" cy="155" r="1.5"/><circle cx="755" cy="162" r="1.5"/>
  </g>

  <!-- Terminal window -->
  <rect x="68" y="48" width="742" height="224" rx="10" fill="#020610" fill-opacity="0.95" stroke="#182035"/>

  <!-- Title bar -->
  <rect x="68" y="48" width="742" height="34" rx="10" fill="#0b1422" stroke="#182035"/>
  <rect x="68" y="68" width="742" height="14" fill="#0b1422"/>

  <!-- Traffic lights -->
  <circle cx="100" cy="65" r="5.5" fill="#ef4444"/>
  <circle cx="120" cy="65" r="5.5" fill="#f59e0b"/>
  <circle cx="140" cy="65" r="5.5" fill="#22c55e"/>

  <!-- Tab label -->
  <text x="439" y="70" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#2d3f55" text-anchor="middle">undertaker — bash — 120×32</text>

  <!-- Command -->
  <text x="96" y="114" fill="#3d5166" font-family="Consolas, 'Courier New', monospace" font-size="15">$ undertaker --only-suspicious --days 180</text>

  <!-- Output: summary -->
  <text x="96" y="140" fill="#4a6175" font-family="Consolas, 'Courier New', monospace" font-size="13">Found 847 tasks, 12 suspicious (3 high severity).</text>

  <!-- High severity row highlight -->
  <rect x="96" y="149" width="700" height="21" rx="3" fill="#7f1d1d" fill-opacity="0.30"/>
  <text x="104" y="163" fill="#fca5a5" font-family="Consolas, 'Courier New', monospace" font-size="13">■ HIGH   root   /etc/cron.d/cleanup.sh   age 1,847d   SYSTEM</text>

  <!-- Accent line under terminal output -->
  <rect x="96" y="174" width="680" height="1.5" fill="url(#accentLine)"/>

  <!-- Name -->
  <text x="96" y="206" fill="#f8fafc" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700">David Sarkisyan</text>

  <!-- Tagline -->
  <text x="96" y="237" fill="#5EEAD4" font-family="Consolas, 'Courier New', monospace" font-size="16">security ops  ·  endpoint  ·  automation</text>

  <!-- Prompt cursor -->
  <text x="96" y="258" fill="#3d5166" font-family="Consolas, 'Courier New', monospace" font-size="15">$</text>
  <rect x="109" y="245" width="9" height="16" rx="1" fill="#5EEAD4" fill-opacity="0.7"/>

  <!-- Right panel -->
  <rect x="878" y="56" width="238" height="208" rx="14" fill="#020610" fill-opacity="0.62" stroke="#18263a"/>

  <!-- Shield -->
  <path d="M997 88L1056 116V172C1056 208 1028 228 997 244C966 228 938 208 938 172V116L997 88Z"
        stroke="#38BDF8" stroke-width="5.5" stroke-linejoin="round" fill="#020610" fill-opacity="0.5"/>
  <!-- Check -->
  <path d="M976 176L990 192L1020 156" stroke="#5EEAD4" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Alert badge -->
  <circle cx="1048" cy="100" r="10" fill="#E09B3C"/>
  <text x="1048" y="105" font-family="Consolas, monospace" font-size="12" fill="#04070f" text-anchor="middle" font-weight="900">!</text>
</svg>
